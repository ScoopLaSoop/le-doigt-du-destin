<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Le Doigt du Destin</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0a0a0a">
</head>
<body>

  <!-- Screen 1: Accueil -->
  <div id="screen-home" class="screen active">
    <div class="screen-content center">
      <div class="logo">☠️</div>
      <h1 class="game-title">Le Doigt<br>du Destin</h1>
      <p class="subtitle">Un seul perdant.<br>Tous les autres regardent.</p>
      <button class="btn btn-primary" onclick="showScreen('screen-gage')">Nouveau Jeu</button>
    </div>
  </div>

  <!-- Screen 2: Le Gage -->
  <div id="screen-gage" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-home')">←</button>
      <h2>Le Gage</h2>
    </div>
    <div class="screen-content">
      <p class="label">Quel est le gage du perdant ?</p>
      <textarea id="gage-input" placeholder="Ex: faire 20 pompes, appeler son ex, chanter devant tout le monde..." maxlength="200"></textarea>
      <div class="char-count"><span id="char-count">0</span>/200</div>
      <button class="btn btn-primary" onclick="validateGage()">Suivant →</button>
    </div>
  </div>

  <!-- Screen 3: Joueurs -->
  <div id="screen-players" class="screen">
    <div class="screen-header">
      <button class="btn-back" onclick="showScreen('screen-gage')">←</button>
      <h2>Les Joueurs</h2>
      <span class="player-count-badge" id="player-count-badge"></span>
    </div>
    <div class="screen-content">
      <div class="add-player-form">
        <button class="avatar-btn" id="avatar-btn" onclick="openCamera()">
          <img id="preview-avatar" src="" alt="" style="display:none">
          <span id="avatar-placeholder">📷</span>
        </button>
        <button class="btn-gallery" onclick="openGallery()" title="Choisir depuis la galerie">🖼️</button>
        <input type="file" id="gallery-input" accept="image/*" style="display:none">
        <input type="text" id="player-name" placeholder="Nom du joueur" maxlength="20" autocomplete="off">
        <button class="btn-add" onclick="addPlayer()">+</button>
      </div>
      <div id="players-list" class="players-list"></div>
      <div class="bottom-actions">
        <p class="hint" id="players-hint">Ajoutez au moins 2 joueurs</p>
        <button class="btn btn-primary" id="start-btn" onclick="startGame()" disabled>C'est parti ! 🎲</button>
      </div>
    </div>
  </div>

  <!-- Screen 4: Doigts -->
  <div id="screen-fingers" class="screen fingers-screen">
    <div id="fingers-instruction" class="fingers-instruction">
      <span id="next-player-name" class="next-name"></span>
      <span class="instruction-sub">pose ton doigt sur l'écran</span>
      <div id="fingers-progress" class="fingers-progress"></div>
    </div>
    <div id="touch-area" class="touch-area"></div>
    <div id="countdown-overlay" class="countdown-overlay hidden">
      <div id="countdown-number" class="countdown-number">3</div>
    </div>
  </div>

  <!-- Screen 5: Révélation -->
  <div id="screen-reveal" class="screen reveal-screen">
    <div class="reveal-content">
      <div id="reveal-avatar" class="reveal-avatar"></div>
      <div id="reveal-name" class="reveal-name"></div>
      <div id="reveal-gage" class="reveal-gage"></div>
      <button class="btn-icon" onclick="speakReveal()">🔊 Écouter</button>
      <div class="reveal-actions">
        <button class="btn btn-secondary" onclick="replayGame()">Rejouer</button>
        <button class="btn btn-primary" onclick="newGame()">Nouvelle partie</button>
      </div>
    </div>
  </div>

  <!-- Camera Modal -->
  <div id="camera-modal" class="modal hidden">
    <div class="modal-content">
      <video id="camera-video" autoplay playsinline muted></video>
      <div class="camera-controls">
        <button class="btn btn-secondary" style="width:auto;padding:14px 24px" onclick="closeCamera()">Annuler</button>
        <button class="btn-capture" onclick="capturePhoto()">📸</button>
      </div>
    </div>
    <canvas id="capture-canvas" style="display:none"></canvas>
  </div>

  <!-- Anti-triche flash -->
  <div id="no-cheat-overlay" class="no-cheat-overlay hidden">
    <div class="no-cheat-text">☝️ Pas de triche !</div>
  </div>

  <script src="app.js"></script>
</body>
</html>
